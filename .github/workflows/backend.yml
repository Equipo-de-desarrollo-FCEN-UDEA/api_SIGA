name: Docker Image CI

on:
  push:
    branches:
      - 'server'
  pull_request:
    branches:
      - 'server'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_ID }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build and push backend image
        uses: docker/build-push-action@v3
        with:
          context: ./docker
          file: Dockerfile.dev
          push: true
          tags: ${{ secrets.DOCKER_ID }}/siga-backend:1.0.0
      -
        name: Build and push celery_worker image
        uses: docker/build-push-action@v3
        with:
          context: ./docker
          file: Dockerfile.dev
          push: true
          tags: ${{ secrets.DOCKER_ID }}/siga-celery_worker:1.0.0
      -
        name: Build and push celery_beat image
        uses: docker/build-push-action@v3
        with:
          context: ./docker
          file: Dockerfile.dev
          push: true
          tags: ${{ secrets.DOCKER_ID }}/siga-celery_beat:1.0.0
